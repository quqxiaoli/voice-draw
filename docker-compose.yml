# 评委一条命令复现:cp env.example .env 填 key 后 docker compose up
services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./data:/app/data   # SQLite 文件落在宿主机,重启不丢
    restart: unless-stopped

  frontend:
    # 后端地址在浏览器端按 window.location 运行时拼接(见 frontend/lib/stream.ts),
    # 无需 NEXT_PUBLIC_API_BASE build arg / env,换部署 IP 无需重新构建镜像
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
