# 评委一条命令复现:cp .env.example .env 填 key 后 docker compose up
# 赛前 6.11 需在本机 + 服务器各实测一次(清单第 9/11 项)
services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./data:/app/data   # SQLite 文件落在宿主机,重启不丢
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # 流式页面浏览器直连后端(见 constitution 第 11 节),这里是给浏览器用的公网地址
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
    depends_on:
      - backend
    restart: unless-stopped
